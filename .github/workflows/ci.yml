name: QueueCTL CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    name: Lint Codebase
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64

  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Check Go Formatting (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted. Run 'gofmt -w .'"
            gofmt -d .
            exit 1
          fi

      - name: Run Go Vet
        run: go vet ./...

      - name: Run Test Suite with Race Detector (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Run Test Suite (macOS / Windows)
        if: matrix.os != 'ubuntu-latest'
        run: go test -v -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload Coverage Report to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-${{ matrix.os }}
          path: coverage.txt
          retention-days: 7

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.txt
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Cross-Compile Binaries
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Create Artifact Directory
        run: mkdir -p dist

      - name: Build for Linux (amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/queuectl-linux-amd64 ./cmd/queuectl/main.go

      - name: Build for macOS (amd64)
        run: CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/queuectl-darwin-amd64 ./cmd/queuectl/main.go

      - name: Build for Windows (amd64)
        run: CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/queuectl-windows-amd64.exe ./cmd/queuectl/main.go

      - name: Upload Binary Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: queuectl-cli-binaries
          path: dist/
          retention-days: 14

  docker:
    name: Verify Docker Container Build
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Validate Docker Image (Production Target)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: production
          push: false
          tags: queuectl:latest
